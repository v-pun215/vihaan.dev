<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="{{ .Description }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="canonical" href="{{ .CanonicalURL }}">
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{ .Title }} | Vihaan Pundir">
  <meta property="og:description" content="{{ .Description }}">
  <meta property="og:url" content="{{ .CanonicalURL }}">
  <meta property="og:image" content="{{ .OGImageURL }}">
  <meta property="og:site_name" content="Vihaan Pundir">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ .Title }} | Vihaan Pundir">
  <meta name="twitter:description" content="{{ .Description }}">
  <meta name="twitter:image" content="{{ .OGImageURL }}">
  <link rel="stylesheet" href="/style.css">
  <title>{{ .Title }} | Vihaan Pundir</title>
  <script type="application/ld+json">{{ .JSONLD }}</script>
  <style>
    .post-page {
      width: min(100%, 1100px);
      margin: 28px auto 60px;
      padding: 0 20px;
      box-sizing: border-box;
    }
    .post-shell {
      display: grid;
      gap: 30px;
    }
    .post-hero {
      padding: 24px 0 0;
      position: relative;
    }
    .post-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: var(--color-muted);
      font-family: var(--mono-font);
      font-size: 0.98rem;
      letter-spacing: 0.01em;
      margin-bottom: 18px;
    }
    .post-title {
      font-family: var(--heading-font);
      font-size: clamp(2.9rem, 7vw, 5rem);
      line-height: 1.05;
      margin: 0 0 16px;
      color: var(--color-text);
      max-width: 12ch;
    }
    .post-description {
      font-family: var(--text-font);
      font-size: 1.22rem;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.78);
      margin: 0;
      max-width: 62ch;
    }
    .post-visual {
      position: relative;
    }
    .post-thumbnail {
      display: block;
      width: 100%;
      margin: 0;
      border-radius: 26px;
      aspect-ratio: 32 / 11;
      object-fit: cover;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 24px 56px rgba(0, 0, 0, 0.22);
    }
    .post-body-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) min(100%, 720px) minmax(0, 1fr);
    }
    .post-body {
      grid-column: 2;
      position: relative;
      padding: 0 0 22px;
      font-family: var(--text-font);
      font-size: 1.12rem;
      line-height: 1.85;
      color: var(--color-text);
    }
    .post-body::before {
      content: "";
      position: absolute;
      left: -34px;
      top: 6px;
      bottom: 12px;
      width: 1px;
      background: linear-gradient(180deg, rgba(79, 209, 197, 0.45), rgba(79, 209, 197, 0));
    }
    .post-body > *:first-child {
      margin-top: 0;
    }
    .post-body > p:first-child {
      font-size: 1.24rem;
      line-height: 1.78;
      color: rgba(255, 255, 255, 0.9);
    }
    .post-body > p:first-child::first-letter {
      float: left;
      font-family: var(--heading-font);
      font-size: 3.8rem;
      line-height: 0.82;
      padding-right: 10px;
      padding-top: 8px;
      color: var(--color-text);
    }
    .post-body h1,
    .post-body h2,
    .post-body h3,
    .post-body h4 {
      font-family: var(--heading-font);
      color: var(--color-text);
      line-height: 1.18;
      margin-top: 2.5rem;
      margin-bottom: 0.95rem;
    }
    .post-body p,
    .post-body ul,
    .post-body ol,
    .post-body pre,
    .post-body blockquote {
      margin-top: 0;
      margin-bottom: 1.2rem;
    }
    .post-body a {
      color: var(--color-teal);
      text-decoration-thickness: 1px;
      text-underline-offset: 0.12em;
    }
    .post-body code {
      font-family: var(--mono-font);
      font-size: 0.95em;
    }
    .post-body pre {
      background: rgba(10, 14, 18, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 18px;
      padding: 18px;
      overflow-x: auto;
    }
    .post-body blockquote {
      margin-left: 0;
      padding-left: 20px;
      border-left: 2px solid var(--color-teal);
      color: rgba(255, 255, 255, 0.72);
    }
    .post-body img {
      max-width: 100%;
      border-radius: 18px;
      display: block;
      margin: 1.5rem auto;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.18);
    }
    @media (max-width: 900px) {
      .post-body-shell {
        grid-template-columns: 1fr;
      }
      .post-body {
        grid-column: 1;
      }
      .post-body::before {
        display: none;
      }
    }
    @media (max-width: 720px) {
      .post-page {
        margin-top: 18px;
        padding: 0 14px;
      }
      .post-thumbnail {
        border-radius: 18px;
        aspect-ratio: 16 / 10;
      }
      .post-description {
        font-size: 1.06rem;
      }
      .post-body {
        font-size: 1.06rem;
        line-height: 1.8;
      }
      .post-body > p:first-child::first-letter {
        font-size: 3.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="links">
      <a class="name" href="/">Vihaan Pundir</a>
      <div class="right-links">
        <a href="/projects">Projects</a>
        <a href="/pieces">Pieces</a>
        <a href="/blog">Blog</a>
      </div>
    </div>
  </div>

  <main class="post-page">
    <article class="post-shell">
      <header class="post-hero">
        <div class="post-meta">
          <span>{{ .DatePublished }}</span>
          <span>&bull;</span>
          <span>{{ .Category }}</span>
          {{ if .LastUpdated }}
            <span>&bull;</span>
            <span>Updated {{ .LastUpdated }}</span>
          {{ end }}
        </div>
        <h1 class="post-title">{{ .Title }}</h1>
        <p class="post-description">{{ .Description }}</p>
      </header>

      {{ if .Thumbnail }}
        <div class="post-visual">
          <img class="post-thumbnail" src="{{ .Thumbnail }}" alt="{{ .Title }}" onerror="this.onerror=null;this.src='/img/post.avif';">
        </div>
      {{ end }}

      <div class="post-body-shell">
        <section class="post-body">
          {{ .Content }}
        </section>
      </div>
    </article>
  </main>
</body>
</html>
