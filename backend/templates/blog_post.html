<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="{{ .Description }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="canonical" href="{{ .CanonicalURL }}">
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{ .Title }} | Vihaan Pundir">
  <meta property="og:description" content="{{ .Description }}">
  <meta property="og:url" content="{{ .CanonicalURL }}">
  <meta property="og:image" content="{{ .OGImageURL }}">
  <meta property="og:site_name" content="Vihaan Pundir">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ .Title }} | Vihaan Pundir">
  <meta name="twitter:description" content="{{ .Description }}">
  <meta name="twitter:image" content="{{ .OGImageURL }}">
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
  <link rel="stylesheet" href="/style.css">
  <title>{{ .Title }} | Vihaan Pundir</title>
  <script type="application/ld+json">{{ .JSONLD }}</script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ESG2KV6NYS"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-ESG2KV6NYS');
    </script>
</head>
<body>
  <div class="top-bar">
    <div class="links">
      <a class="name" href="/">Vihaan Pundir</a>
      <div class="right-links">
        <a href="/projects">Projects</a>
        <a href="/pieces">Pieces</a>
        <a href="/blog">Blog</a>
      </div>
    </div>
  </div>

  <main class="post-page">
    <article class="post-shell">
      <header class="post-hero">
        <div class="post-meta">
          <span>{{ .DatePublished }}</span>
          <span>&bull;</span>
          <span>{{ .Category }}</span>
          {{ if .LastUpdated }}
            <span>&bull;</span>
            <span>Updated {{ .LastUpdated }}</span>
          {{ end }}
        </div>
        <h1 class="post-title">{{ .Title }}</h1>
        <p class="post-description">{{ .Description }}</p>
      </header>

      {{ if .Thumbnail }}
        <div class="post-visual">
          <img class="post-thumbnail" src="{{ .Thumbnail }}" alt="{{ .Title }}" onerror="this.onerror=null;this.src='/img/post.avif';">
        </div>
      {{ end }}

      <div class="post-body-shell">
        <section class="post-body">
          {{ .Content }}
        </section>
      </div>
    </article>
  </main>
</body>
</html>
